<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Slicer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c10;--s1:#121218;--s2:#18181f;--s3:#1f1f28;--s4:#262632;
  --b0:rgba(255,255,255,0.04);--b1:rgba(255,255,255,0.08);
  --b2:rgba(255,255,255,0.13);--b3:rgba(255,255,255,0.22);
  --t0:#ededf2;--t1:#9090aa;--t2:#555568;
  --acc:#6c5ce7;--accl:#a29af8;--accbg:rgba(108,92,231,0.12);--accb:rgba(108,92,231,0.28);
  --grn:#2dd4a0;--grnbg:rgba(45,212,160,0.08);--grnb:rgba(45,212,160,0.22);
  --red:#f87171;--redbg:rgba(248,113,113,0.08);--redb:rgba(248,113,113,0.22);
  --amb:#f59e0b;--ambbg:rgba(245,158,11,0.08);--ambb:rgba(245,158,11,0.22);
  --r:10px;--rs:7px;--rxs:4px
}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t0);display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── DROP SCREEN ── */
#drop-screen{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:18px;background:var(--bg);z-index:100;cursor:pointer;
  transition:background .18s
}
#drop-screen.drag-over,#drop-screen:hover{background:var(--s1)}
#drop-screen input{display:none}
.drop-ring{
  width:88px;height:88px;border-radius:50%;
  border:1.5px dashed var(--b3);background:var(--s2);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .18s,background .18s
}
#drop-screen:hover .drop-ring,#drop-screen.drag-over .drop-ring{border-color:var(--acc);background:var(--accbg)}
#drop-screen h1{font-size:22px;font-weight:700;letter-spacing:-.4px}
#drop-screen p{font-size:14px;color:var(--t2)}
.local-pill{display:flex;align-items:center;gap:6px;background:var(--grnbg);border:1px solid var(--grnb);border-radius:20px;padding:5px 16px;font-size:12px;color:var(--grn);font-weight:500}

/* ── APP SHELL ── */
#app{display:none;flex:1;flex-direction:column;overflow:hidden}

/* HEADER */
.hdr{display:flex;align-items:center;gap:10px;padding:0 14px;height:50px;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0}
.logo{width:28px;height:28px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-name{font-size:14px;font-weight:700;letter-spacing:-.2px;margin-right:4px;white-space:nowrap}
.file-chip{display:flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--b1);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--t1);max-width:200px;min-width:0}
.file-chip .fn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.file-chip .pg{color:var(--t2);flex-shrink:0}
.mode-seg{display:flex;background:var(--s3);border:1px solid var(--b1);border-radius:var(--rs);padding:3px;gap:2px;margin-left:auto;flex-shrink:0}
.msb{padding:5px 13px;border-radius:5px;border:none;background:transparent;color:var(--t2);font-size:12px;font-weight:500;transition:background .14s,color .14s;white-space:nowrap}
.msb.active{background:var(--acc);color:#fff}
.kbd-row{display:flex;gap:8px;font-size:11px;color:var(--t2);flex-shrink:0}
.kbd{background:var(--s3);border:1px solid var(--b2);border-radius:3px;padding:1px 5px;font-family:monospace;font-size:10px;color:var(--t1)}
.hdr-btn{background:none;border:1px solid var(--b1);color:var(--t2);padding:4px 10px;border-radius:var(--rs);font-size:12px;transition:border-color .14s,color .14s;flex-shrink:0}
.hdr-btn:hover{border-color:var(--b3);color:var(--t0)}

/* ── WORKSPACE ── */
.workspace{display:flex;flex:1;overflow:hidden}

/* FILMSTRIP */
.filmstrip{width:172px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--b1);background:var(--s1);overflow:hidden}
.fs-top{padding:8px;border-bottom:1px solid var(--b0);flex-shrink:0}
.fs-top input{width:100%;background:var(--s3);border:1px solid var(--b1);border-radius:var(--rs);padding:6px 9px;color:var(--t0);font-size:12px;outline:none;transition:border-color .14s}
.fs-top input:focus{border-color:var(--acc)}
.fs-top input::placeholder{color:var(--t2)}
.fs-scroll{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px}
.thumb-card{border:1.5px solid var(--b1);border-radius:var(--rs);overflow:hidden;cursor:pointer;background:var(--s2);transition:border-color .13s,transform .08s;position:relative;flex-shrink:0;user-select:none}
.thumb-card:hover{border-color:var(--b3);transform:translateX(2px)}
.thumb-card.selected{border-color:var(--acc);box-shadow:0 0 0 2px var(--accbg)}
.thumb-card canvas,.thumb-ph{width:100%;display:block}
.thumb-ph{aspect-ratio:.707;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t2)}
.thumb-lbl{font-size:10px;text-align:center;padding:3px 0 4px;color:var(--t2);background:var(--s2)}
.thumb-card.selected .thumb-lbl{color:var(--accl);background:var(--accbg)}
.sel-dot{position:absolute;top:4px;right:4px;width:16px;height:16px;background:var(--acc);border-radius:50%;display:none;align-items:center;justify-content:center}
.thumb-card.selected .sel-dot{display:flex}

/* PREVIEW */
.prev-pane{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:var(--bg);position:relative;min-width:0}
#prev-cvs{max-width:calc(100% - 32px);max-height:calc(100% - 56px);box-shadow:0 8px 40px rgba(0,0,0,.6);border-radius:2px;display:none}
.prev-lbl{position:absolute;bottom:14px;background:var(--s2);border:1px solid var(--b1);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--t1);display:none}
.prev-empty{color:var(--t2);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:8px}

/* ACTIONS */
.act-pane{width:296px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--b1);background:var(--s1);overflow:hidden}

/* PICK MODE */
#pick-pane{display:flex;flex-direction:column;height:100%}
.pick-scroll{flex:1;overflow-y:auto;padding:12px}
.pick-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.pick-cnt{font-size:13px;font-weight:500;flex:1}
.pick-cnt em{font-style:normal;color:var(--accl);font-size:20px;font-weight:700}
.sm-btn{background:none;border:1px solid var(--b1);color:var(--t2);padding:4px 10px;border-radius:var(--rs);font-size:12px;transition:border-color .13s,color .13s}
.sm-btn:hover{border-color:var(--b3);color:var(--t0)}

.pick-empty{text-align:center;padding:1.8rem 1rem;color:var(--t2);font-size:13px;border:1.5px dashed var(--b1);border-radius:var(--r);margin-bottom:12px;line-height:1.7}
.pick-empty b{color:var(--t1)}

.reorder-list{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.ro-item{display:flex;align-items:center;gap:7px;background:var(--s3);border:1px solid var(--b1);border-radius:var(--rs);padding:6px 9px;font-size:12px;cursor:grab;user-select:none;transition:border-color .12s,opacity .12s}
.ro-item.dragging{opacity:.35}
.ro-item.drag-over{border-color:var(--acc);background:var(--accbg)}
.ro-handle{color:var(--t2);flex-shrink:0;display:flex;align-items:center}
.ro-pg{font-weight:600;color:var(--accl);font-family:monospace;font-size:11px}
.ro-rm{margin-left:auto;background:none;border:none;color:var(--t2);display:flex;align-items:center;padding:0;transition:color .12s}
.ro-rm:hover{color:var(--red)}

.summ-box{background:var(--s3);border:1px solid var(--b1);border-radius:var(--rs);padding:9px 12px;font-size:12px;color:var(--t2);margin-bottom:10px;line-height:1.7}
.summ-box b{color:var(--t0)}

.act-row{display:flex;flex-direction:column;gap:7px}
.act-btn{display:flex;align-items:center;gap:8px;border-radius:var(--rs);padding:10px 13px;font-size:13px;font-weight:500;border:none;transition:opacity .14s,transform .08s;width:100%}
.act-btn:hover:not(:disabled){opacity:.86}
.act-btn:active:not(:disabled){transform:scale(.99)}
.act-btn:disabled{opacity:.28;cursor:not-allowed}
.act-btn.pri{background:var(--acc);color:#fff}
.act-btn.sec{background:var(--s3);border:1px solid var(--b2);color:var(--t0)}
.act-btn .bdg{margin-left:auto;background:rgba(0,0,0,.22);border-radius:3px;padding:1px 7px;font-size:11px;font-weight:400}

/* SLICE MODE */
#slice-pane{display:none;flex-direction:column;height:100%}
.slice-scroll{flex:1;overflow-y:auto;padding:12px}
.add-row{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--b2);border-radius:var(--r);padding:11px;font-size:13px;color:var(--t2);cursor:pointer;transition:border-color .14s,color .14s,background .14s;margin-bottom:10px}
.add-row:hover{border-color:var(--accb);color:var(--accl);background:var(--accbg)}

.slice-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:13px;margin-bottom:9px;transition:border-color .13s}
.slice-card.sc-ok{border-color:var(--accb)}
.slice-card.sc-err{border-color:var(--redb)}
.slice-card.sc-dup{border-color:var(--ambb)}
.sc-top{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.sc-num{width:21px;height:21px;border-radius:50%;background:var(--accbg);border:1px solid var(--accb);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accl);flex-shrink:0}
.sc-name{flex:1;background:var(--s3);border:1px solid var(--b1);border-radius:var(--rs);padding:6px 9px;color:var(--t0);font-size:12px;outline:none;transition:border-color .13s}
.sc-name:focus{border-color:var(--acc)}
.sc-name::placeholder{color:var(--t2)}
.sc-del{width:24px;height:24px;background:none;border:1px solid var(--b1);border-radius:var(--rs);color:var(--t2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .13s,color .13s}
.sc-del:hover{border-color:var(--redb);color:var(--red)}
.rng-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.rng-row label{font-size:11px;color:var(--t2);white-space:nowrap;flex-shrink:0}
.rng-in{flex:1;background:var(--s3);border:1px solid var(--b1);border-radius:var(--rs);padding:6px 9px;color:var(--t0);font-size:12px;font-family:'Courier New',monospace;outline:none;transition:border-color .13s}
.rng-in:focus{border-color:var(--acc)}
.rng-in.ri-ok{border-color:var(--grnb)}
.rng-in.ri-err{border-color:var(--redb)}
.sc-msg{font-size:11px;margin-bottom:7px}
.sc-msg.msg-ok{color:var(--t2)}
.sc-msg.msg-err{color:var(--red)}
.sc-msg.msg-dup{color:var(--amb)}

.sc-order{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;max-height:110px;overflow-y:auto}
.so-item{display:flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--b0);border-radius:var(--rxs);padding:4px 7px;font-size:11px;cursor:grab;user-select:none;transition:border-color .1s,opacity .1s}
.so-item.dragging{opacity:.3}
.so-item.drag-over{border-color:var(--acc)}
.so-h{color:var(--t2);flex-shrink:0;display:flex;align-items:center}
.so-p{color:var(--accl);font-family:monospace;font-weight:600}
.so-rm{margin-left:auto;background:none;border:none;color:var(--t2);display:flex;align-items:center;padding:0;transition:color .1s}
.so-rm:hover{color:var(--red)}

.sc-dl{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--s3);border:1px solid var(--b2);border-radius:var(--rs);padding:7px;font-size:12px;color:var(--t1);transition:border-color .13s,color .13s}
.sc-dl:hover:not(:disabled){border-color:var(--accb);color:var(--accl)}
.sc-dl:disabled{opacity:.3;cursor:not-allowed}

.slice-foot{padding:11px 12px;border-top:1px solid var(--b1);flex-shrink:0}
.dl-all{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--acc);color:#fff;border:none;border-radius:var(--rs);padding:11px;font-size:13px;font-weight:600;transition:opacity .14s}
.dl-all:hover:not(:disabled){opacity:.87}
.dl-all:disabled{opacity:.28;cursor:not-allowed}
.prog-wrap{width:100%;height:3px;background:var(--b1);border-radius:3px;overflow:hidden;margin-top:8px;display:none}
.prog-fill{height:100%;background:var(--acc);width:0;transition:width .22s}

/* MODAL */
#modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:22px;width:100%;max-width:380px;max-height:80vh;overflow-y:auto}
.modal-h{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:9px}
.modal-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--b0);font-size:13px}
.modal-row:last-of-type{border-bottom:none}
.modal-row label{color:var(--t2)}
.modal-row span{font-weight:500;font-family:monospace;color:var(--t0)}
.modal-pg-wrap{margin-top:10px;font-size:12px;color:var(--t2);line-height:2}
.pg-chip{display:inline-block;background:var(--accbg);color:var(--accl);border:1px solid var(--accb);border-radius:3px;padding:1px 6px;margin:2px;font-family:monospace;font-size:11px}
.modal-acts{display:flex;gap:8px;margin-top:18px}
.modal-cancel{flex:1;background:none;border:1px solid var(--b2);border-radius:var(--rs);padding:9px;color:var(--t1);font-size:13px;transition:border-color .13s}
.modal-cancel:hover{border-color:var(--b3)}
.modal-ok{flex:2;background:var(--acc);border:none;border-radius:var(--rs);padding:9px;color:#fff;font-size:13px;font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s3);border:1px solid var(--b2);color:var(--t0);padding:8px 18px;border-radius:var(--r);font-size:13px;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;z-index:600;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--grnb)}
.toast.err{border-color:var(--redb)}
</style>
</head>
<body>

<!-- DROP SCREEN -->
<div id="drop-screen" onclick="document.getElementById('fi').click()">
  <input type="file" id="fi" accept=".pdf">
  <div class="drop-ring">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#555568" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>
  </div>
  <h1>PDF Slicer</h1>
  <p>Drop a PDF here, or click to browse</p>
  <div class="local-pill">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
    100% local — nothing ever uploaded
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <div class="logo"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="9" y1="13" x2="15" y2="13"/></svg></div>
    <span class="hdr-name">PDF Slicer</span>
    <div class="file-chip"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg><span class="fn" id="hdr-fn"></span><span class="pg" id="hdr-pg"></span></div>
    <div class="mode-seg">
      <button class="msb active" id="mb-pick" onclick="setMode('pick')">Pick &amp; Act</button>
      <button class="msb" id="mb-slice" onclick="setMode('slice')">Named Slices</button>
    </div>
    <div class="kbd-row">
      <span><span class="kbd">Ctrl A</span> all</span>
      <span><span class="kbd">Esc</span> clear</span>
      <span><span class="kbd">Ctrl ↵</span> download</span>
    </div>
    <button class="hdr-btn" onclick="resetAll()">↩ New PDF</button>
  </div>

  <div class="workspace">
    <!-- FILMSTRIP -->
    <div class="filmstrip">
      <div class="fs-top">
        <input id="fs-in" type="text" placeholder="Range: 5-10, 15…" oninput="rangeHighlight(this.value)">
      </div>
      <div class="fs-scroll" id="fs-scroll"></div>
    </div>

    <!-- PREVIEW -->
    <div class="prev-pane" id="prev-pane">
      <div class="prev-empty" id="prev-empty">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#555568" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        <span>Click a page to preview it</span>
      </div>
      <canvas id="prev-cvs"></canvas>
      <div class="prev-lbl" id="prev-lbl"></div>
    </div>

    <!-- ACTIONS -->
    <div class="act-pane">

      <!-- PICK MODE -->
      <div id="pick-pane">
        <div class="pick-scroll">
          <div class="pick-hdr">
            <div class="pick-cnt"><em id="sel-n">0</em> pages selected</div>
            <button class="sm-btn" onclick="selectAll()">All</button>
            <button class="sm-btn" onclick="clearSel()">Clear</button>
          </div>
          <div class="pick-empty" id="pick-empty">
            Click thumbnails to select pages,<br>
            or type a range like <b>10-30</b> above the filmstrip.
          </div>
          <div class="reorder-list" id="ro-list" style="display:none"></div>
          <div id="pick-actions" style="display:none">
            <div class="summ-box" id="pick-summ"></div>
            <div class="act-row">
              <button class="act-btn pri" id="btn-combine" onclick="triggerCombine()" disabled>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><rect x="8" y="18" width="8" height="4" rx="1"/><path d="M4 6v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6"/><path d="M4 18v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/><line x1="12" y1="10" x2="12" y2="14"/></svg>
                Combine into one PDF
                <span class="bdg" id="comb-bdg"></span>
              </button>
              <button class="act-btn sec" id="btn-split" onclick="triggerSplit()" disabled>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M12 22v-8.3a4 4 0 0 0-1.172-2.872L3 3"/><path d="m15 9 6-6"/></svg>
                Split into separate PDFs
                <span class="bdg" id="split-bdg"></span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- SLICE MODE -->
      <div id="slice-pane">
        <div class="slice-scroll">
          <div class="add-row" onclick="addSlice()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add a new slice
          </div>
          <div id="slice-list"></div>
        </div>
        <div class="slice-foot">
          <div class="summ-box" id="slice-summ" style="display:none"></div>
          <button class="dl-all" id="dl-all" onclick="downloadAllSlices()" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download all as ZIP
          </button>
          <div class="prog-wrap" id="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-ov" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-h">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      <span id="modal-title">Download preview</span>
    </div>
    <div id="modal-rows"></div>
    <div class="modal-pg-wrap" id="modal-pgs"></div>
    <div class="modal-acts">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-ok" onclick="confirmModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── PDF.js worker ───────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ───────────────────────────────────────────────────────────────────
let raw = null;        // Uint8Array — NEVER hand to pdf-lib directly
let pdfJs = null;
let total = 0;
let fsize = 0;
let fname = '';
let mode  = 'pick';

// pick
let sel = new Set();
let ord = [];          // display/output order for combine

// slice
let slices = [];
let sidx   = 0;

// drag
let drag = { from:-1, sid:null };

// modal
let pending = null;

// ── File load ───────────────────────────────────────────────────────────────
const ds = document.getElementById('drop-screen');
const fi = document.getElementById('fi');

ds.addEventListener('dragover', e => { e.preventDefault(); ds.classList.add('drag-over'); });
ds.addEventListener('dragleave', () => ds.classList.remove('drag-over'));
ds.addEventListener('drop', e => {
  e.preventDefault(); ds.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  f?.type === 'application/pdf' ? loadPDF(f) : toast('Drop a PDF file','err');
});
fi.addEventListener('change', e => e.target.files[0] && loadPDF(e.target.files[0]));

async function loadPDF(file) {
  try {
    fname = file.name; fsize = file.size;
    const buf = await file.arrayBuffer();
    raw = new Uint8Array(buf);
    pdfJs = await pdfjsLib.getDocument({ data: raw.slice() }).promise;
    total = pdfJs.numPages;
    document.getElementById('hdr-fn').textContent = fname;
    document.getElementById('hdr-pg').textContent = `· ${total} pages`;
    ds.style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'flex';
    sel.clear(); ord = []; slices = []; sidx = 0;
    buildFilmstrip();
    renderPick();
    renderSlices();
  } catch(e) { toast('Load failed: '+e.message,'err'); }
}

// ── Filmstrip ───────────────────────────────────────────────────────────────
function buildFilmstrip() {
  const fs = document.getElementById('fs-scroll');
  fs.innerHTML = '';
  for (let i = 1; i <= total; i++) {
    const c = document.createElement('div');
    c.className = 'thumb-card';
    c.id = 'tc'+i;
    c.dataset.p = i;
    c.innerHTML = `<div class="thumb-ph" id="tp${i}"><span>${i}</span></div><div class="thumb-lbl">p. ${i}</div><div class="sel-dot"><svg width="7" height="7" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg></div>`;
    c.addEventListener('click', () => togglePage(i));
    fs.appendChild(c);
    loadThumb(i);
  }
}

async function loadThumb(n) {
  try {
    const pg = await pdfJs.getPage(n);
    const vp = pg.getViewport({ scale: 0.27 });
    const cv = document.createElement('canvas');
    cv.width = vp.width; cv.height = vp.height;
    await pg.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
    const ph = document.getElementById('tp'+n);
    if (ph) ph.replaceWith(cv);
  } catch(_) {}
}

// ── Preview ──────────────────────────────────────────────────────────────────
let prevBusy = false;
async function showPrev(n) {
  if (prevBusy) return;
  prevBusy = true;
  try {
    const pane = document.getElementById('prev-pane');
    const cv = document.getElementById('prev-cvs');
    const mw = pane.clientWidth - 40, mh = pane.clientHeight - 60;
    const pg = await pdfJs.getPage(n);
    const nat = pg.getViewport({ scale:1 });
    const sc = Math.min(mw/nat.width, mh/nat.height, 2.2);
    const vp = pg.getViewport({ scale:sc });
    cv.width = vp.width; cv.height = vp.height;
    await pg.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
    document.getElementById('prev-empty').style.display = 'none';
    cv.style.display = 'block';
    const lbl = document.getElementById('prev-lbl');
    lbl.style.display = 'block';
    lbl.textContent = `Page ${n} of ${total}`;
  } catch(_) {} finally { prevBusy = false; }
}

// ── Page toggle ──────────────────────────────────────────────────────────────
function togglePage(n) {
  if (sel.has(n)) { sel.delete(n); ord = ord.filter(p=>p!==n); }
  else { sel.add(n); ord.push(n); }
  updateThumb(n);
  showPrev(n);
  renderPick();
}

function updateThumb(n) {
  document.getElementById('tc'+n)?.classList.toggle('selected', sel.has(n));
}

function syncThumbs() { for (let i=1;i<=total;i++) updateThumb(i); }

function selectAll() {
  sel.clear(); ord = [];
  for (let i=1;i<=total;i++){sel.add(i);ord.push(i);}
  syncThumbs(); renderPick();
  if (mode!=='pick') setMode('pick');
}

function clearSel() {
  sel.clear(); ord = [];
  syncThumbs();
  document.getElementById('fs-in').value = '';
  renderPick();
}

// ── Range highlight ──────────────────────────────────────────────────────────
function rangeHighlight(v) {
  if (!v.trim()) { clearSel(); return; }
  const r = parseRange(v, total);
  if (r.error) return;
  sel.clear(); ord = r.pages.slice();
  r.pages.forEach(p=>sel.add(p));
  syncThumbs();
  // scroll to first
  const first = document.getElementById('tc'+r.pages[0]);
  if (first) first.scrollIntoView({ behavior:'smooth', block:'nearest' });
  renderPick();
}

// ── Pick panel ───────────────────────────────────────────────────────────────
function renderPick() {
  const n = ord.length;
  document.getElementById('sel-n').textContent = n;
  const empty = document.getElementById('pick-empty');
  const rol   = document.getElementById('ro-list');
  const acts  = document.getElementById('pick-actions');
  const summ  = document.getElementById('pick-summ');

  if (n === 0) {
    empty.style.display='block'; rol.style.display='none'; acts.style.display='none';
    document.getElementById('btn-combine').disabled=true;
    document.getElementById('btn-split').disabled=true;
    return;
  }
  empty.style.display='none'; rol.style.display='flex'; acts.style.display='block';
  document.getElementById('btn-combine').disabled=false;
  document.getElementById('btn-split').disabled=false;

  const est = Math.round((n/total)*fsize);
  summ.innerHTML = `<b>${n}</b> page${n>1?'s':''} selected · est. <b>${fmt(est)}</b> · drag to reorder below`;
  document.getElementById('comb-bdg').textContent = n+' pages';
  document.getElementById('split-bdg').textContent = n+' files';

  // Reorder list
  rol.innerHTML = '';
  ord.forEach((p,i) => {
    const el = document.createElement('div');
    el.className='ro-item'; el.draggable=true; el.dataset.i=i;
    el.innerHTML=`<span class="ro-handle">${grip()}</span><span class="ro-pg">p. ${p}</span><button class="ro-rm" onclick="removePg(${p})">${x()}</button>`;
    el.addEventListener('dragstart',e=>{drag.from=i;e.dataTransfer.effectAllowed='move';setTimeout(()=>el.classList.add('dragging'),0);});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');const to=+el.dataset.i;if(drag.from!==to){const m=ord.splice(drag.from,1)[0];ord.splice(to,0,m);renderPick();}});
    rol.appendChild(el);
  });
}

function removePg(p) {
  sel.delete(p); ord=ord.filter(x=>x!==p);
  updateThumb(p); renderPick();
}

// ── Mode ─────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode=m;
  document.getElementById('mb-pick').className='msb'+(m==='pick'?' active':'');
  document.getElementById('mb-slice').className='msb'+(m==='slice'?' active':'');
  document.getElementById('pick-pane').style.display=m==='pick'?'block':'none';
  document.getElementById('slice-pane').style.display=m==='slice'?'flex':'none';
}

// ── Slice mode ────────────────────────────────────────────────────────────────
function addSlice() {
  sidx++;
  slices.push({id:sidx,name:`Slice ${sidx}`,range:'',pages:[],order:[],valid:false,err:''});
  renderSlices();
  setTimeout(()=>{const el=document.getElementById('sn'+sidx);if(el){el.focus();el.select();}},30);
}

function delSlice(id) { slices=slices.filter(s=>s.id!==id); renderSlices(); }

function dupMap() {
  const m={};
  slices.forEach(s=>s.pages.forEach(p=>{(m[p]=m[p]||[]).push(s.id);}));
  return m;
}

function renderSlices() {
  const list = document.getElementById('slice-list');
  list.innerHTML = '';
  const dm = dupMap();

  slices.forEach((s,si) => {
    const dups = s.pages.filter(p=>dm[p]&&dm[p].length>1);
    let cls = 'slice-card';
    if (s.valid && !dups.length) cls+=' sc-ok';
    else if (!s.valid && s.range) cls+=' sc-err';
    else if (dups.length) cls+=' sc-dup';

    let msgHtml='';
    if (!s.range) msgHtml='';
    else if (!s.valid) msgHtml=`<div class="sc-msg msg-err">${esc(s.err)}</div>`;
    else if (dups.length) msgHtml=`<div class="sc-msg msg-dup">⚠ p.${dups.slice(0,4).join(', ')} overlaps another slice</div>`;
    else msgHtml=`<div class="sc-msg msg-ok">${s.order.length} page${s.order.length>1?'s':''} · drag to reorder</div>`;

    const card = document.createElement('div');
    card.className=cls; card.id='sc'+s.id;
    card.innerHTML=`
      <div class="sc-top">
        <div class="sc-num">${si+1}</div>
        <input class="sc-name" id="sn${s.id}" value="${esc(s.name)}" placeholder="PDF name…" oninput="sname(${s.id},this.value)">
        <button class="sc-del" onclick="delSlice(${s.id})">${x()}</button>
      </div>
      <div class="rng-row">
        <label>Pages</label>
        <input class="rng-in${s.valid?' ri-ok':s.range&&!s.valid?' ri-err':''}" id="sri${s.id}" value="${esc(s.range)}" placeholder="10-30, 45, 52-60…" oninput="srange(${s.id},this.value)">
      </div>
      ${msgHtml}
      ${s.valid&&s.order.length?`<div class="sc-order" id="so${s.id}"></div>`:''}
      <button class="sc-dl" id="sdl${s.id}" onclick="previewSliceDl(${s.id})" ${s.valid?'':'disabled'}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download this slice
      </button>`;
    list.appendChild(card);
    if (s.valid && s.order.length) buildSliceOrder(s);
  });

  const valid = slices.filter(s=>s.valid);
  const tot = valid.reduce((a,s)=>a+s.order.length,0);
  const ss = document.getElementById('slice-summ');
  const da = document.getElementById('dl-all');
  if (!slices.length){ss.style.display='none';da.disabled=true;return;}
  ss.style.display='block';
  ss.innerHTML=`<b>${valid.length}</b>/${slices.length} slice${slices.length>1?'s':''} ready · <b>${tot}</b> total pages`;
  da.disabled=valid.length===0;
}

function buildSliceOrder(s) {
  const c = document.getElementById('so'+s.id);
  if (!c) return;
  c.innerHTML='';
  s.order.forEach((p,i) => {
    const el=document.createElement('div');
    el.className='so-item';el.draggable=true;el.dataset.i=i;
    el.innerHTML=`<span class="so-h">${grip10()}</span><span class="so-p">p.${p}</span><button class="so-rm" onclick="rmFromSlice(${s.id},${p})">${x10()}</button>`;
    el.addEventListener('dragstart',e=>{drag.from=i;drag.sid=s.id;e.dataTransfer.effectAllowed='move';setTimeout(()=>el.classList.add('dragging'),0);});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');if(drag.sid!==s.id)return;const to=+el.dataset.i;if(drag.from!==to){const m=s.order.splice(drag.from,1)[0];s.order.splice(to,0,m);buildSliceOrder(s);}});
    c.appendChild(el);
  });
}

function sname(id,v){const s=slices.find(s=>s.id===id);if(s)s.name=v;updSliceFoot();}

function srange(id,v) {
  const s=slices.find(s=>s.id===id);
  if(!s)return;
  s.range=v;
  if(!v.trim()){s.valid=false;s.pages=[];s.order=[];s.err='';}
  else {
    const r=parseRange(v,total);
    s.valid=!r.error; s.pages=r.error?[]:r.pages;
    s.order=r.error?[]:r.pages.slice(); s.err=r.error||'';
  }
  renderSlices();
}

function rmFromSlice(id,p) {
  const s=slices.find(s=>s.id===id);
  if(!s)return;
  s.pages=s.pages.filter(x=>x!==p);
  s.order=s.order.filter(x=>x!==p);
  s.valid=s.pages.length>0;
  renderSlices();
}

function updSliceFoot() {
  const valid=slices.filter(s=>s.valid);
  document.getElementById('dl-all').disabled=valid.length===0;
}

// ── Download triggers ────────────────────────────────────────────────────────
function triggerCombine() {
  if(!ord.length)return;
  const base=fname.replace(/\.pdf$/i,'');
  const est=Math.round((ord.length/total)*fsize);
  openModal({title:'Combine into one PDF',name:base,pages:ord.slice(),type:'combine',est});
}

function triggerSplit() {
  if(!ord.length)return;
  const base=fname.replace(/\.pdf$/i,'');
  const est=Math.round((ord.length/total)*fsize);
  openModal({title:`Split into ${ord.length} separate PDFs`,name:base,pages:ord.slice(),type:'split',est});
}

function previewSliceDl(id) {
  const s=slices.find(s=>s.id===id);
  if(!s||!s.valid)return;
  const est=Math.round((s.order.length/total)*fsize);
  openModal({title:`Download: ${s.name||'slice'}`,name:s.name,pages:s.order.slice(),type:'slice',est});
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(data) {
  pending=data;
  document.getElementById('modal-title').textContent=data.title;
  const outName = data.type==='split'
    ? `${safe(data.name)}_split.zip`
    : `${safe(data.name||'output')}.pdf`;
  document.getElementById('modal-rows').innerHTML=`
    <div class="modal-row"><label>Output file</label><span>${outName}</span></div>
    <div class="modal-row"><label>Pages</label><span>${data.pages.length}</span></div>
    <div class="modal-row"><label>Est. size</label><span>~${fmt(data.est)}</span></div>
  `;
  const chips=data.pages.slice(0,48).map(p=>`<span class="pg-chip">p.${p}</span>`).join('');
  const more=data.pages.length>48?`<span style="color:var(--t2)"> +${data.pages.length-48} more</span>`:'';
  document.getElementById('modal-pgs').innerHTML=chips+more;
  document.getElementById('modal-ov').style.display='flex';
}

function closeModal(e) {
  if(e&&e.target!==document.getElementById('modal-ov'))return;
  document.getElementById('modal-ov').style.display='none';
  pending=null;
}

async function confirmModal() {
  document.getElementById('modal-ov').style.display='none';
  if(!pending)return;
  const {type,pages,name}=pending;
  pending=null;
  if(type==='combine'||type==='slice') await dlSingle(pages,safe(name||'output')+'.pdf');
  else if(type==='split') await dlSplit(pages,safe(name||'output'));
}

// ── Slice zip ─────────────────────────────────────────────────────────────────
async function downloadAllSlices() {
  const valid=slices.filter(s=>s.valid);
  if(!valid.length)return;
  const btn=document.getElementById('dl-all');
  const pw=document.getElementById('prog-wrap');
  const pf=document.getElementById('prog-fill');
  btn.disabled=true; pw.style.display='block';
  try {
    const zip=new JSZip();
    for(let i=0;i<valid.length;i++){
      pf.style.width=Math.round(i/valid.length*90)+'%';
      const s=valid[i];
      zip.file(safe(s.name||`slice-${i+1}`)+'.pdf', await buildPDF(s.order));
    }
    pf.style.width='98%';
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:3}});
    pf.style.width='100%';
    dl(blob, safe(fname.replace(/\.pdf$/i,''))+'_slices.zip');
    toast(`Downloaded ${valid.length} PDFs as ZIP`,'ok');
  } catch(e){toast('Error: '+e.message,'err');}
  finally{setTimeout(()=>{btn.disabled=false;pw.style.display='none';pf.style.width='0';},700);}
}

// ── PDF builders ─────────────────────────────────────────────────────────────
async function dlSingle(pages,outName){
  try{const b=await buildPDF(pages);dl(new Blob([b]),outName);toast('Downloaded '+outName,'ok');}
  catch(e){toast('Error: '+e.message,'err');}
}

async function dlSplit(pages,base){
  try{
    const zip=new JSZip();
    for(const p of pages) zip.file(`${base}_p${p}.pdf`,await buildPDF([p]));
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:3}});
    dl(blob,base+'_split.zip');
    toast(`Downloaded ${pages.length} PDFs as ZIP`,'ok');
  }catch(e){toast('Error: '+e.message,'err');}
}

// CRITICAL — fresh copy every call prevents detached ArrayBuffer error
async function buildPDF(pages){
  const {PDFDocument}=PDFLib;
  const src=await PDFDocument.load(raw.slice().buffer);
  const out=await PDFDocument.create();
  const copied=await out.copyPages(src,pages.map(p=>p-1));
  copied.forEach(p=>out.addPage(p));
  return out.save();
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(!raw)return;
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.ctrlKey&&e.key==='a'){e.preventDefault();selectAll();}
  if(e.key==='Escape'){clearSel();document.getElementById('modal-ov').style.display='none';}
  if(e.ctrlKey&&e.key==='Enter'){
    if(mode==='pick'&&ord.length)triggerCombine();
    else if(mode==='slice')downloadAllSlices();
  }
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function parseRange(str,max){
  const pages=new Set();
  for(const part of str.split(',').map(s=>s.trim()).filter(Boolean)){
    if(/^\d+$/.test(part)){const n=+part;if(n<1||n>max)return{error:`Page ${n} out of range (1–${max})`};pages.add(n);}
    else if(/^\d+-\d+$/.test(part)){const[a,b]=part.split('-').map(Number);if(a<1||b>max)return{error:`Range ${part} out of bounds (1–${max})`};if(a>b)return{error:`${part}: start must be ≤ end`};for(let i=a;i<=b;i++)pages.add(i);}
    else return{error:`Can't parse "${part}"`};
  }
  if(!pages.size)return{error:'No pages found'};
  return{pages:[...pages].sort((a,b)=>a-b)};
}

function fmt(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(0)+'KB';return(b/1048576).toFixed(1)+'MB';}
function safe(s){return String(s).replace(/[^\w\s\-(). ]/g,'').replace(/\s+/g,'_').slice(0,60)||'output';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function dl(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),2000);}
function toast(msg,type=''){const e=document.getElementById('toast');e.textContent=msg;e.className='toast show '+type;setTimeout(()=>e.className='toast',3000);}

// SVG icons as strings
const grip=()=>`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>`;
